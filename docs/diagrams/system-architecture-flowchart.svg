<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #475569; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 24; ry: 24; }
      .lane-title { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .box { stroke: #334155; stroke-width: 2; rx: 18; ry: 18; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 14px Arial, sans-serif; fill: #1e293b; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow2 { stroke: #059669; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
      .arrow3 { stroke: #dc2626; stroke-width: 3; fill: none; marker-end: url(#arrow3); }
      .muted { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow4); stroke-dasharray: 8 8; }
      .note { fill: #fff7ed; stroke: #fdba74; stroke-width: 2; rx: 16; ry: 16; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="1920" height="1080" fill="#eef6ff"/>
  <text x="56" y="58" class="title">MedCoreAI System Architecture Flowchart</text>
  <text x="56" y="86" class="subtitle">Derived from the current codebase: Next.js App Router frontend, Prisma/PostgreSQL persistence, and FastAPI support services for image/report/translation and healthcare conversation.</text>

  <rect x="40" y="110" width="170" height="900" class="lane"/>
  <text x="60" y="145" class="lane-title">1. User Surface</text>

  <rect x="230" y="110" width="330" height="900" class="lane"/>
  <text x="250" y="145" class="lane-title">2. Frontend UI</text>

  <rect x="580" y="110" width="420" height="900" class="lane"/>
  <text x="600" y="145" class="lane-title">3. Next.js Server / API Layer</text>

  <rect x="1020" y="110" width="260" height="900" class="lane"/>
  <text x="1040" y="145" class="lane-title">4. Persistence</text>

  <rect x="1300" y="110" width="350" height="900" class="lane"/>
  <text x="1320" y="145" class="lane-title">5. FastAPI Backend</text>

  <rect x="1670" y="110" width="210" height="900" class="lane"/>
  <text x="1690" y="145" class="lane-title">6. Models / External</text>

  <rect x="58" y="190" width="134" height="120" class="box" fill="#dbeafe"/>
  <text x="78" y="220" class="box-title">Browser User</text>
  <text x="78" y="245" class="box-text">Login/signup</text>
  <text x="78" y="266" class="box-text">Chat symptoms</text>
  <text x="78" y="287" class="box-text">Upload image/report</text>

  <rect x="58" y="360" width="134" height="120" class="box" fill="#e0f2fe"/>
  <text x="77" y="390" class="box-title">Session Cookie</text>
  <text x="77" y="415" class="box-text">NextAuth JWT</text>
  <text x="77" y="436" class="box-text">sent with app</text>

  <rect x="58" y="530" width="134" height="120" class="box" fill="#dcfce7"/>
  <text x="73" y="560" class="box-title">UI Actions</text>
  <text x="73" y="585" class="box-text">Hindi toggle</text>
  <text x="73" y="606" class="box-text">popup / PDF</text>
  <text x="73" y="627" class="box-text">session switch</text>

  <rect x="250" y="185" width="290" height="140" class="box" fill="#ffffff"/>
  <text x="270" y="215" class="box-title">App Router Pages</text>
  <text x="270" y="240" class="box-text">`app/(Main)/chat/page.tsx` main diagnosis UI</text>
  <text x="270" y="261" class="box-text">`app/(Basic Auth)/*` login/signup/reset/verify</text>
  <text x="270" y="282" class="box-text">landing/about/philosophy/onboarding pages</text>

  <rect x="250" y="350" width="290" height="160" class="box" fill="#fefce8"/>
  <text x="270" y="380" class="box-title">Client State + Components</text>
  <text x="270" y="405" class="box-text">attachment preparation and previews</text>
  <text x="270" y="426" class="box-text">follow-up question state restoration</text>
  <text x="270" y="447" class="box-text">translation prefetch/cache</text>
  <text x="270" y="468" class="box-text">diagnosis popup + result side panel</text>
  <text x="270" y="489" class="box-text">progress bars for image/report analysis</text>

  <rect x="250" y="545" width="290" height="140" class="box" fill="#eef2ff"/>
  <text x="270" y="575" class="box-title">Providers + Auth Context</text>
  <text x="270" y="600" class="box-text">`providers.tsx` SessionProvider wrapper</text>
  <text x="270" y="621" class="box-text">`useSession()` guards the chat page</text>
  <text x="270" y="642" class="box-text">session drives API authorization</text>

  <rect x="250" y="720" width="290" height="170" class="box" fill="#f0fdf4"/>
  <text x="270" y="750" class="box-title">Frontend Output Features</text>
  <text x="270" y="775" class="box-text">stores user uploads in message `jsonPayload`</text>
  <text x="270" y="796" class="box-text">renders diagnosis summary and top predictions</text>
  <text x="270" y="817" class="box-text">supports Hindi translation requests</text>
  <text x="270" y="838" class="box-text">creates styled downloadable report/PDF</text>
  <text x="270" y="859" class="box-text">lets user load/delete chat sessions</text>

  <rect x="600" y="180" width="380" height="165" class="box" fill="#ffffff"/>
  <text x="620" y="210" class="box-title">Auth Routes + NextAuth</text>
  <text x="620" y="235" class="box-text">`api/auth/[...nextauth]` with Prisma adapter</text>
  <text x="620" y="256" class="box-text">credentials + Google provider</text>
  <text x="620" y="277" class="box-text">register / verify / reset / request-link mail flows</text>
  <text x="620" y="298" class="box-text">JWT session callback injects `session.user.id`</text>
  <text x="620" y="319" class="box-text">mail via Nodemailer + verification tokens</text>

  <rect x="600" y="380" width="380" height="205" class="box" fill="#ecfeff"/>
  <text x="620" y="410" class="box-title">Diagnosis Orchestrator in Next.js</text>
  <text x="620" y="435" class="box-text">`api/diagnose/chat/json/route.ts`</text>
  <text x="620" y="456" class="box-text">loads local disease/symptom datasets from disk</text>
  <text x="620" y="477" class="box-text">detects medical intent vs normal chat</text>
  <text x="620" y="498" class="box-text">parses persisted follow-up state from Prisma messages</text>
  <text x="620" y="519" class="box-text">extracts slots: age, gender, severity, duration, flags</text>
  <text x="620" y="540" class="box-text">scores diseases + adjusts by demographics/clinical context</text>
  <text x="620" y="561" class="box-text">decides follow-up loop or final multimodal diagnosis</text>

  <rect x="600" y="620" width="380" height="170" class="box" fill="#fef2f2"/>
  <text x="620" y="650" class="box-title">Proxy / Utility API Routes</text>
  <text x="620" y="675" class="box-text">`api/conversation/chat/json` -> FastAPI conversation</text>
  <text x="620" y="696" class="box-text">`api/diagnose/upload-report` -> FastAPI report analysis</text>
  <text x="620" y="717" class="box-text">`api/diagnose/translate` -> backend translate, OpenAI fallback</text>
  <text x="620" y="738" class="box-text">`api/images/search` external image helper for tips</text>
  <text x="620" y="759" class="box-text">for backend calls, sends `X-Internal-Secret` + `X-User-Id`</text>

  <rect x="600" y="825" width="380" height="145" class="box" fill="#f5f3ff"/>
  <text x="620" y="855" class="box-title">Chat Persistence Routes</text>
  <text x="620" y="880" class="box-text">`api/chat/sessions` create/list user sessions</text>
  <text x="620" y="901" class="box-text">`api/chat/sessions/[id]/messages` store/load chat turns</text>
  <text x="620" y="922" class="box-text">assistant payload carries follow-up state or diagnosis JSON</text>
  <text x="620" y="943" class="box-text">route ownership validated against signed-in user</text>

  <rect x="1040" y="205" width="220" height="180" class="box" fill="#ffffff"/>
  <text x="1060" y="235" class="box-title">PostgreSQL via Prisma</text>
  <text x="1060" y="260" class="box-text">User</text>
  <text x="1060" y="281" class="box-text">Account / Session</text>
  <text x="1060" y="302" class="box-text">VerificationToken</text>
  <text x="1060" y="323" class="box-text">ChatSession</text>
  <text x="1060" y="344" class="box-text">Message + `jsonPayload`</text>
  <text x="1060" y="365" class="small">source of truth for frontend chat history</text>

  <rect x="1040" y="440" width="220" height="150" class="box" fill="#f0fdf4"/>
  <text x="1060" y="470" class="box-title">Persisted Payload Semantics</text>
  <text x="1060" y="495" class="box-text">user payload: image/report previews</text>
  <text x="1060" y="516" class="box-text">assistant payload: follow-up state,</text>
  <text x="1060" y="537" class="box-text">diagnosis JSON, image/report outputs</text>
  <text x="1060" y="558" class="box-text">enables chat resume after reload</text>

  <rect x="1040" y="650" width="220" height="220" class="box" fill="#fefce8"/>
  <text x="1060" y="680" class="box-title">Local Files Used by App</text>
  <text x="1060" y="705" class="box-text">frontend local disease dataset files</text>
  <text x="1060" y="726" class="box-text">backend `medical_ML/models/*` weights</text>
  <text x="1060" y="747" class="box-text">backend `medical_ML/data/*` symptom data</text>
  <text x="1060" y="768" class="box-text">backend `chroma_data/history/*.json`</text>
  <text x="1060" y="789" class="box-text">JSON history store (named chroma_store)</text>
  <text x="1060" y="810" class="box-text">transient browser object URLs for previews</text>
  <text x="1060" y="831" class="small">no blob/S3 storage in current repo</text>

  <rect x="1320" y="185" width="310" height="150" class="box" fill="#ffffff"/>
  <text x="1340" y="215" class="box-title">FastAPI App Bootstrap</text>
  <text x="1340" y="240" class="box-text">`backend/main.py`</text>
  <text x="1340" y="261" class="box-text">CORS + timeout middleware</text>
  <text x="1340" y="282" class="box-text">startup warmup hooks for image models</text>
  <text x="1340" y="303" class="box-text">mounts diagnose + conversation routers</text>

  <rect x="1320" y="370" width="310" height="190" class="box" fill="#ecfccb"/>
  <text x="1340" y="400" class="box-title">Diagnose Support Endpoints</text>
  <text x="1340" y="425" class="box-text">`/api/diagnose/image-predict` with rate limit</text>
  <text x="1340" y="446" class="box-text">base64 decode, format/size validation, resize</text>
  <text x="1340" y="467" class="box-text">predict across selected MedMNIST datasets</text>
  <text x="1340" y="488" class="box-text">`/upload-report` PDF/text/image -> OCR/API analysis</text>
  <text x="1340" y="509" class="box-text">`/translate` structured question-aware translation</text>
  <text x="1340" y="530" class="box-text">warmup + dataset recommendation endpoints</text>

  <rect x="1320" y="595" width="310" height="165" class="box" fill="#fee2e2"/>
  <text x="1340" y="625" class="box-title">Conversation Router</text>
  <text x="1340" y="650" class="box-text">`/api/conversation/chat/json`</text>
  <text x="1340" y="671" class="box-text">healthcare-only system prompt</text>
  <text x="1340" y="692" class="box-text">forwards to OpenAI-compatible chat completion API</text>
  <text x="1340" y="713" class="box-text">rejects unrelated domains, suggests diagnosis mode</text>
  <text x="1340" y="734" class="box-text">auth via shared secret or JWT fallback</text>

  <rect x="1320" y="795" width="310" height="175" class="box" fill="#e0e7ff"/>
  <text x="1340" y="825" class="box-title">Python Internal Modules</text>
  <text x="1340" y="850" class="box-text">`image_predictor.py` lazy model loading + caching</text>
  <text x="1340" y="871" class="box-text">`report_analyzer.py` OCR + LLM symptom extraction</text>
  <text x="1340" y="892" class="box-text">`translator/service.py` Deep Translator workflow</text>
  <text x="1340" y="913" class="box-text">`diagnose_ml.py` older ML path still present</text>
  <text x="1340" y="934" class="box-text">`auth.py` resolves `X-User-Id` or JWT identity</text>

  <rect x="1690" y="190" width="170" height="145" class="box" fill="#ffffff"/>
  <text x="1710" y="220" class="box-title">Local ML Assets</text>
  <text x="1710" y="245" class="box-text">MedMNIST model weights</text>
  <text x="1710" y="266" class="box-text">metadata.json</text>
  <text x="1710" y="287" class="box-text">tabular ML pickles</text>
  <text x="1710" y="308" class="box-text">symptom CSV datasets</text>

  <rect x="1690" y="380" width="170" height="160" class="box" fill="#f0f9ff"/>
  <text x="1710" y="410" class="box-title">OpenAI-Compatible APIs</text>
  <text x="1710" y="435" class="box-text">normal conversation</text>
  <text x="1710" y="456" class="box-text">report summarization</text>
  <text x="1710" y="477" class="box-text">follow-up generation</text>
  <text x="1710" y="498" class="box-text">guidance generation</text>
  <text x="1710" y="519" class="box-text">frontend translation fallback</text>

  <rect x="1690" y="590" width="170" height="135" class="box" fill="#f0fdf4"/>
  <text x="1710" y="620" class="box-title">Google Translator</text>
  <text x="1710" y="645" class="box-text">backend translation</text>
  <text x="1710" y="666" class="box-text">question-aware Hindi</text>
  <text x="1710" y="687" class="box-text">chunked text support</text>

  <rect x="1690" y="770" width="170" height="145" class="box" fill="#fff7ed"/>
  <text x="1710" y="800" class="box-title">Optional OCR</text>
  <text x="1710" y="825" class="box-text">`pytesseract` if installed</text>
  <text x="1710" y="846" class="box-text">otherwise image OCR falls back</text>
  <text x="1710" y="867" class="box-text">to API-based report analysis</text>

  <rect x="690" y="993" width="560" height="54" class="note"/>
  <text x="712" y="1025" class="box-text">Architecture note: the current repo is hybrid. The main diagnosis state machine lives in Next.js, while FastAPI provides multimodal support services and normal healthcare conversation.</text>

  <path d="M192 250 H250" class="arrow"/>
  <path d="M192 420 H250" class="arrow"/>
  <path d="M192 590 H250" class="arrow"/>

  <path d="M540 255 H600" class="arrow"/>
  <path d="M540 430 H600" class="arrow"/>
  <path d="M540 630 H600" class="arrow"/>
  <path d="M540 820 H600" class="arrow"/>

  <path d="M980 250 H1040" class="arrow2"/>
  <path d="M980 470 H1040" class="arrow2"/>
  <path d="M980 885 H1040" class="arrow2"/>

  <path d="M980 470 H1320" class="arrow"/>
  <path d="M980 685 H1320" class="arrow"/>

  <path d="M1260 745 H1320" class="arrow2"/>
  <path d="M1630 450 H1690" class="arrow3"/>
  <path d="M1630 680 H1690" class="arrow3"/>
  <path d="M1630 865 H1690" class="arrow3"/>
  <path d="M1630 270 H1690" class="arrow2"/>

  <path d="M1090 385 V440" class="muted"/>
  <path d="M1090 590 V650" class="muted"/>
  <path d="M1450 335 V370" class="muted"/>
  <path d="M1450 560 V595" class="muted"/>
  <path d="M1450 760 V795" class="muted"/>

  <text x="844" y="362" class="small">session / request validation</text>
  <text x="1115" y="467" class="small">persisted chat memory</text>
  <text x="1500" y="452" class="small">secure backend proxy</text>
  <text x="1510" y="867" class="small">model and translation dependencies</text>
</svg>

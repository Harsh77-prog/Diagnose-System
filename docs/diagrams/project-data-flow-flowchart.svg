  <path d="M680 885 C760 885,760 885,740 885" class="arrow"/>
  <path d="M680 895 C760 895,760 895,740 895" class="arrow"/>
  <path d="M680 905 C760 905,760 905,740 905" class="arrow"/>
  <path d="M680 910 C850 910,1050 910,1190 910" class="green"/>
  <path d="M680 905 C520 905, 350 905, 270 1018" class="arrow"/>

  <text x="1068" y="418" class="tiny">No -> informational/general path</text>
  <text x="872" y="523" class="tiny">Yes</text>
  <text x="1062" y="580" class="tiny">Yes, enrich with attachments</text>
  <text x="865" y="679" class="tiny">No attachments</text>
  <text x="864" y="674" class="tiny"></text>
  <text x="1060" y="610" class="tiny"></text>
  <text x="846" y="693" class="tiny"></text>
  <text x="1058" y="583" class="tiny"></text>
  <text x="861" y="926" class="tiny">Need more data</text>
  <text x="1055" y="987" class="tiny">Translate / extra UX branch</text>
  <text x="1112" y="575" class="tiny">symptoms + slots + attachments feed scoring</text>
  <text x="1260" y="959" class="tiny">assistant payload becomes recoverable state</text>
</svg>
